#cloud-config
package_update: true
package_upgrade: false

users:
  - name: __WSL_USERNAME__
    gecos: __WSL_GECOS__
    groups: [adm, sudo, audio, video, plugdev, netdev]
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash

packages:
  - git
  - curl
  - ca-certificates

write_files:
  - path: /etc/wsl.conf
    append: true
    owner: root:root
    permissions: "0644"
    content: |
      [user]
      default=__WSL_USERNAME__

  - path: /usr/local/bin/bootstrap-ubuntu-wsl.sh
    permissions: "0755"
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail

      WSL_USERNAME="__WSL_USERNAME__"
      REPO_URL="__DOTFILES_REPO_URL__"
      BRANCH="__DOTFILES_REPO_BRANCH__"
      USER_HOME="/home/${WSL_USERNAME}"
      WORKDIR="${USER_HOME}/dotfiles"

      if [[ ! -d "${WORKDIR}/.git" ]]; then
        git clone --depth 1 --branch "${BRANCH}" "${REPO_URL}" "${WORKDIR}"
      else
        git -C "${WORKDIR}" fetch --depth 1 origin "${BRANCH}"
        git -C "${WORKDIR}" checkout "${BRANCH}"
        git -C "${WORKDIR}" reset --hard "origin/${BRANCH}"
      fi

      bash "${WORKDIR}/.init/common/bootstrap-ubuntu.sh" wsl

runcmd:
  - [su, -l, __WSL_USERNAME__, -c, /usr/local/bin/bootstrap-ubuntu-wsl.sh]

final_message: "cloud-init complete: Ubuntu WSL tooling bootstrap finished."
